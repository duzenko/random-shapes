<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Барабашка</title>
<style>
  :root { --bg:#f4f1ea; --panel:#fff; --line:#d9d2c5; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: system-ui, "Segoe UI", sans-serif;
    background: var(--bg);
    color: #2b2b2b;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 18px;
  }
  h1 { margin: 6px 0 2px; font-size: 26px; }
  .sub { color: #777; font-size: 14px; margin-bottom: 14px; }

  .modes { display: flex; gap: 6px; margin-bottom: 18px; }
  .modes button {
    padding: 8px 14px; border: 1px solid var(--line); border-radius: 999px;
    background: #fff; cursor: pointer; font-size: 14px;
  }
  .modes button.active { background: #2b2b2b; color: #fff; border-color: #2b2b2b; }

  .card {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    box-shadow: 0 6px 18px rgba(0,0,0,.06);
    padding: 26px 40px;
    display: flex;
    gap: 40px;
    align-items: center;
    min-height: 170px;
  }
  .question { font-size: 18px; margin: 18px 0 4px; font-weight: 600; }

  .pieces {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 10px;
  }
  .piece {
    background: #fff;
    border: 2px solid var(--line);
    border-radius: 14px;
    padding: 10px 8px 6px;
    width: 104px;
    cursor: pointer;
    text-align: center;
    transition: transform .08s, border-color .1s, box-shadow .1s;
  }
  .piece:hover { transform: translateY(-3px); box-shadow: 0 6px 14px rgba(0,0,0,.1); }
  .piece.correct { border-color: #2e9e4f; box-shadow: 0 0 0 3px #b6e3c2; }
  .piece.wrong   { border-color: #d23b3b; box-shadow: 0 0 0 3px #f3c0c0; }
  .label { font-size: 13px; margin-top: 4px; color: #555; }

  svg { display: block; margin: 0 auto; }

  .feedback { font-size: 17px; min-height: 26px; margin: 16px 0 4px; font-weight: 600; }
  .explain { color: #666; font-size: 14px; min-height: 20px; max-width: 460px; text-align: center; }

  .bar { display: flex; gap: 20px; align-items: center; margin-top: 14px; }
  .bar button {
    padding: 10px 22px; border: none; border-radius: 8px;
    background: #4f8cff; color: #fff; font-size: 15px; cursor: pointer;
  }
  .bar button:hover { background: #3b76e6; }
  .score { font-size: 15px; color: #444; }
  .reset { background: none; color: #999; border: none; cursor: pointer; font-size: 13px; text-decoration: underline; }
</style>
</head>
<body>
  <h1>👻 Барабашка</h1>
  <div class="sub">Найди правильный предмет. Возраст 1,5–2+. Развивает внимание, анализ, память и скорость.</div>

  <div class="modes">
    <button data-mode="A">Уровень 1</button>
    <button data-mode="B">Уровень 2</button>
    <button data-mode="any" class="active">Смешать</button>
  </div>

  <div class="card" id="card"></div>

  <div class="question">Какой предмет нужно схватить?</div>
  <div class="pieces" id="pieces"></div>

  <div class="feedback" id="feedback"></div>
  <div class="explain" id="explain"></div>

  <div class="bar">
    <span class="score" id="score"></span>
    <button id="next">Дальше →</button>
    <button class="reset" id="reset">сбросить счёт</button>
  </div>

<script>
  // The 5 real game pieces: shape + its TRUE colour
  const PIECES = [
    { id: 'ghost',  name: 'Барабашка', color: 'white' },
    { id: 'mouse',  name: 'Мышь',      color: 'gray'  },
    { id: 'couch',  name: 'Диван',     color: 'red'   },
    { id: 'book',   name: 'Книга',     color: 'blue'  },
    { id: 'bottle', name: 'Бутылка',   color: 'green' },
  ];
  const COLORS = ['white', 'gray', 'red', 'blue', 'green'];
  const HEX = { white:'#fafafa', gray:'#8a8a8a', red:'#e53935', blue:'#1e88e5', green:'#43a047' };
  const COLOR_RU = { white:'белый', gray:'серый', red:'красный', blue:'синий', green:'зелёный' };

  const nameOf  = id => PIECES.find(p => p.id === id).name;
  const trueCol = id => PIECES.find(p => p.id === id).color;

  function shuffle(a) {
    a = a.slice();
    for (let i = a.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  }

  // ---- shape silhouettes (single fillable colour) ----
  function svg(shape, color) {
    const c = HEX[color];
    const stroke = color === 'white' ? ' stroke="#cfcfcf" stroke-width="2"' : '';
    let inner;
    if (shape === 'ghost') {
      inner = `<path d="M20,50 a30,30 0 0 1 60,0 L80,82 l-12,8 l-12,-8 l-12,8 l-12,-8 l-12,8 Z" fill="${c}"${stroke}/>`;
    } else if (shape === 'mouse') {
      inner = `<g fill="${c}"${stroke}>
        <circle cx="50" cy="62" r="27"/>
        <circle cx="31" cy="36" r="14"/>
        <circle cx="69" cy="36" r="14"/>
        <path d="M75,74 q20,4 14,22 q-1,-12 -17,-13 Z"/></g>`;
    } else if (shape === 'couch') {
      inner = `<g fill="${c}"${stroke}>
        <rect x="16" y="44" width="68" height="26" rx="7"/>
        <rect x="12" y="56" width="14" height="30" rx="5"/>
        <rect x="74" y="56" width="14" height="30" rx="5"/>
        <rect x="22" y="62" width="56" height="18" rx="5"/>
        <rect x="20" y="84" width="8" height="8"/>
        <rect x="72" y="84" width="8" height="8"/></g>`;
    } else if (shape === 'book') {
      inner = `<g fill="${c}"${stroke}>
        <path d="M50,30 C40,23 22,23 13,28 L13,73 C22,68 40,68 50,75 Z"/>
        <path d="M50,30 C60,23 78,23 87,28 L87,73 C78,68 60,68 50,75 Z"/></g>`;
    } else { // bottle
      inner = `<path d="M43,12 h14 v9 c0,4 6,7 6,15 v41 a6,6 0 0 1 -6,6 h-14 a6,6 0 0 1 -6,-6 v-41 c0,-8 6,-11 6,-15 z" fill="${c}"${stroke}/>`;
    }
    return `<svg width="92" height="92" viewBox="0 0 100 100">${inner}</svg>`;
  }

  // ---- card generation following the real rules ----
  function makeCard(mode) {
    for (let t = 0; t < 800; t++) {
      const shapes = shuffle(PIECES.map(p => p.id)).slice(0, 2);
      const cols   = shuffle(COLORS).slice(0, 2);
      const objs = [
        { shape: shapes[0], color: cols[0] },
        { shape: shapes[1], color: cols[1] },
      ];
      const matches = objs.filter(o => trueCol(o.shape) === o.color);
      let answer = null, type = null;
      if (matches.length === 1) {
        answer = matches[0].shape; type = 'A';
      } else if (matches.length === 0) {
        const us = objs.map(o => o.shape), uc = objs.map(o => o.color);
        const cand = PIECES.filter(p => !us.includes(p.id) && !uc.includes(p.color));
        if (cand.length === 1) { answer = cand[0].id; type = 'B'; }
      }
      if (!answer) continue;
      if (mode === 'A' && type !== 'A') continue;
      if (mode === 'B' && type !== 'B') continue;
      return { objs, answer, type };
    }
    return null;
  }

  // ---- state ----
  let mode = 'any';
  let current = null;
  let solved = false;
  let firstTry = true;
  let score = 0, total = 0, streak = 0, best = 0;

  function renderCard() {
    document.getElementById('card').innerHTML =
      current.objs.map(o => svg(o.shape, o.color)).join('');
  }

  function renderPieces() {
    const box = document.getElementById('pieces');
    box.innerHTML = '';
    PIECES.forEach(p => {
      const div = document.createElement('div');
      div.className = 'piece';
      div.innerHTML = svg(p.id, p.color) + `<div class="label">${p.name}</div>`;
      div.onclick = () => choose(p.id, div);
      box.appendChild(div);
    });
  }

  function choose(id, el) {
    if (solved) return;
    if (id === current.answer) {
      el.classList.add('correct');
      solved = true;
      total++;
      if (firstTry) { score++; streak++; best = Math.max(best, streak); }
      explain(true);
      updateScore();
    } else {
      el.classList.add('wrong');
      firstTry = false;
      streak = 0;
      document.getElementById('feedback').textContent = '✗ Не то — попробуй ещё';
      document.getElementById('feedback').style.color = '#d23b3b';
      updateScore();
    }
  }

  function explain(ok) {
    const fb = document.getElementById('feedback');
    fb.textContent = ok ? '✓ Верно!' : '';
    fb.style.color = '#2e9e4f';
    const ex = document.getElementById('explain');
    const ans = nameOf(current.answer);
    if (current.type === 'A') {
      ex.textContent = `«${ans}» показан своим цветом (${COLOR_RU[trueCol(current.answer)]}) — его и берём.`;
    } else {
      ex.textContent = `Ни один предмет не показан в своём цвете. Убираем лишние по цвету и форме — остаётся «${ans}».`;
    }
  }

  function updateScore() {
    document.getElementById('score').textContent =
      `Решено: ${score}/${total} · серия: ${streak} (рекорд ${best})`;
  }

  function nextCard() {
    current = makeCard(mode);
    solved = false;
    firstTry = true;
    document.getElementById('feedback').textContent = '';
    document.getElementById('explain').textContent = '';
    renderCard();
    renderPieces();
    updateScore();
  }

  // ---- wiring ----
  document.querySelectorAll('.modes button').forEach(b => {
    b.onclick = () => {
      mode = b.dataset.mode;
      document.querySelectorAll('.modes button').forEach(x => x.classList.remove('active'));
      b.classList.add('active');
      nextCard();
    };
  });
  document.getElementById('next').onclick = nextCard;
  document.getElementById('reset').onclick = () => {
    score = total = streak = best = 0; updateScore();
  };

  nextCard();
</script>
</body>
</html>
